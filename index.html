<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Usenet Posts Archive</title>
<link rel="stylesheet" href="styles.css">
<style>
body {
    font-family: system-ui, sans-serif;
    max-width: 800px;
    margin: 2em auto;
    line-height: 1.5;
    padding: 1em;
}
h1 {
    text-align: center;
}
.controls {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 1em;
    margin-bottom: 2em;
}
input[type="number"] {
    width: 60px;
    font-size: 1em;
    text-align: center;
}
button {
    font-size: 1em;
    padding: 0.3em 0.6em;
}
</style>
</head>
<body>
<h1>Usenet Posts Archive</h1>

<div class="controls">
    <button onclick="prevPost()">Previous</button>
    <label for="postNumber">Post #:</label>
    <input type="number" id="postNumber" min="1" max="1287" value="1">
    <button onclick="goToPost()">Go</button>
    <button onclick="nextPost()">Next</button>
</div>

<script>
let currentPost = 1;
const totalPosts = 1287; // adjust if needed

function pad(num) {
    if (num < 10) return '0' + num;
    return num;
}

function goToPost() {
    const input = document.getElementById('postNumber');
    let num = parseInt(input.value, 10);
    if (isNaN(num) || num < 1) num = 1;
    if (num > totalPosts) num = totalPosts;
    currentPost = num;
    window.location.href = `post_${pad(currentPost)}.html`;
}

function prevPost() {
    if (currentPost > 1) {
        currentPost--;
        document.getElementById('postNumber').value = currentPost;
        goToPost();
    }
}

function nextPost() {
    if (currentPost < totalPosts) {
        currentPost++;
        document.getElementById('postNumber').value = currentPost;
        goToPost();
    }
}
</script>

</body>
</html>
